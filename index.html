<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>단어 마스터 🌟 Word Master</title>
<style>
  :root {
    --bg1: #6a5cff;
    --bg2: #ff6ac1;
    --card: #ffffff;
    --ink: #2b2b45;
    --muted: #8a8aa3;
    --accent: #ff9f1c;
    --green: #2ec26b;
    --red: #ff5470;
    --blue: #3ea1ff;
    --purple: #9b5de5;
    --radius: 22px;
    --shadow: 0 12px 34px rgba(60, 40, 120, .22);
    font-family: "Comic Sans MS", "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: var(--ink);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 14px 60px;
  }

  .app {
    width: 100%;
    max-width: 720px;
  }

  .screen { display: none; }
  .screen.active { display: block; animation: pop .35s ease; }

  @keyframes pop {
    from { transform: scale(.96) translateY(10px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 26px 24px;
    margin-bottom: 18px;
  }

  h1 {
    text-align: center;
    color: #fff;
    font-size: 2.5rem;
    margin: 6px 0 4px;
    text-shadow: 0 4px 0 rgba(0,0,0,.15);
    letter-spacing: 1px;
  }
  .subtitle {
    text-align: center;
    color: #fff;
    opacity: .95;
    margin-bottom: 22px;
    font-size: 1.05rem;
  }

  h2 { margin: 0 0 6px; font-size: 1.5rem; }
  .hint { color: var(--muted); font-size: .95rem; margin: 0 0 18px; }

  /* ---- Buttons ---- */
  .btn {
    border: none;
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
    transition: transform .12s ease, filter .12s ease;
    font-family: inherit;
    box-shadow: 0 6px 0 rgba(0,0,0,.14);
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.14); }
  .btn:hover { filter: brightness(1.05); }
  .btn.full { width: 100%; }
  .btn.orange { background: var(--accent); }
  .btn.green  { background: var(--green); }
  .btn.red    { background: var(--red); }
  .btn.blue   { background: var(--blue); }
  .btn.purple { background: var(--purple); }
  .btn.gray   { background: #b9b9c9; box-shadow: 0 6px 0 rgba(0,0,0,.10); }
  .btn.small  { padding: 10px 14px; font-size: .95rem; box-shadow: 0 4px 0 rgba(0,0,0,.12); }

  .menu-grid { display: grid; gap: 16px; }
  .menu-btn {
    display: flex; align-items: center; gap: 16px;
    text-align: left; padding: 20px;
  }
  .menu-btn .emoji { font-size: 2.4rem; }
  .menu-btn .label { display: flex; flex-direction: column; }
  .menu-btn .label b { font-size: 1.3rem; }
  .menu-btn .label span { font-weight: 500; opacity: .9; font-size: .95rem; }

  /* ---- Setup / word list ---- */
  label { display: block; font-weight: 700; margin: 14px 0 6px; }
  input[type="text"], input[type="url"], textarea {
    width: 100%;
    border: 3px solid #e6e6f2;
    border-radius: 14px;
    padding: 13px 14px;
    font-size: 1.05rem;
    font-family: inherit;
    color: var(--ink);
    background: #fbfbff;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--blue); }
  textarea { resize: vertical; min-height: 60px; }

  .word-row {
    border: 2px dashed #ddd;
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 14px;
    position: relative;
    background: #fafaff;
  }
  .word-row .row-num {
    position: absolute; top: -12px; left: 14px;
    background: var(--purple); color: #fff;
    border-radius: 999px; padding: 2px 12px; font-weight: 700; font-size: .85rem;
  }
  .word-row .del {
    position: absolute; top: 10px; right: 10px;
    background: var(--red); color: #fff; border: none; border-radius: 10px;
    width: 30px; height: 30px; cursor: pointer; font-size: 1.1rem; line-height: 1;
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .row-actions { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }

  /* ---- Quiz ---- */
  .progress-wrap { background: #ececf6; border-radius: 999px; height: 16px; overflow: hidden; margin-bottom: 6px; }
  .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--green), var(--blue)); transition: width .4s ease; }
  .progress-text { text-align: right; color: var(--muted); font-size: .85rem; margin-bottom: 18px; }

  .question-box {
    background: linear-gradient(135deg, #f3f0ff, #ffeef7);
    border-radius: 18px;
    padding: 26px 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  .question-box .meaning { font-size: 1.6rem; font-weight: 800; color: var(--purple); }
  .question-box .sub { color: var(--muted); margin-top: 8px; }
  .speak-btn {
    font-size: 3.4rem; background: none; border: none; cursor: pointer;
    transition: transform .12s;
  }
  .speak-btn:active { transform: scale(.85); }
  .blank-sentence { font-size: 1.4rem; line-height: 1.7; font-weight: 700; color: var(--ink); }
  .blank { color: var(--accent); border-bottom: 4px dotted var(--accent); padding: 0 30px; }

  .answer-input {
    text-align: center; font-size: 1.8rem; font-weight: 800; letter-spacing: 3px;
    text-transform: lowercase;
  }

  .options { display: grid; gap: 12px; }
  .option-btn {
    background: #fff; border: 3px solid #e2e2f0; color: var(--ink);
    border-radius: 16px; padding: 16px; font-size: 1.3rem; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: all .12s;
  }
  .option-btn:hover { border-color: var(--blue); transform: translateY(-2px); }
  .option-btn.correct { background: var(--green); color: #fff; border-color: var(--green); }
  .option-btn.wrong { background: var(--red); color: #fff; border-color: var(--red); }
  .option-btn:disabled { cursor: default; }

  .feedback { text-align: center; font-size: 1.4rem; font-weight: 800; min-height: 34px; margin: 10px 0; }
  .feedback.ok { color: var(--green); }
  .feedback.no { color: var(--red); }

  /* ---- Result ---- */
  .result-score { text-align: center; font-size: 5rem; font-weight: 900; margin: 6px 0; }
  .result-emoji { text-align: center; font-size: 5rem; margin-bottom: 4px; }
  .result-msg { text-align: center; font-size: 1.3rem; margin-bottom: 20px; }
  .review-item { padding: 12px 14px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .review-item.ok { background: #e8f9ef; }
  .review-item.no { background: #ffecef; }
  .review-item .w { font-weight: 800; font-size: 1.1rem; }
  .review-item .ans { color: var(--muted); font-size: .95rem; }

  .reward-box { text-align: center; }
  .reward-box .emoji { font-size: 4rem; }
  .bonus-field {
    position: relative;
    height: 360px;
    overflow: hidden;
    border-radius: 18px;
    background: radial-gradient(circle at 20% 20%, #fff7b8, transparent 28%), linear-gradient(135deg, #1f2bff, #ff6ac1);
    box-shadow: inset 0 0 0 4px rgba(255,255,255,.35);
    margin-top: 16px;
  }
  .bonus-star {
    position: absolute;
    border: none;
    background: transparent;
    font-size: 2.8rem;
    cursor: pointer;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 6px 0 rgba(0,0,0,.18));
    animation: starPulse .7s ease-in-out infinite alternate;
  }
  @keyframes starPulse {
    from { transform: translate(-50%, -50%) scale(.9) rotate(-8deg); }
    to { transform: translate(-50%, -50%) scale(1.14) rotate(8deg); }
  }
  .bonus-hud { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: center; }
  .bonus-hud div { background: #f5f6ff; border-radius: 14px; padding: 12px; font-weight: 800; }
  .confetti { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 50; }
  .confetti i {
    position: absolute; top: -20px; width: 12px; height: 12px; opacity: .95;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(105vh) rotate(720deg); opacity: 1; }
  }

  .empty-note { text-align: center; color: var(--muted); padding: 30px 0; }
  .badge { display: inline-block; background: #eee; color: var(--muted); border-radius: 999px; padding: 3px 12px; font-size: .8rem; font-weight: 700; }
</style>
</head>
<body>
<div class="app">
  <h1>🌟 단어 마스터</h1>
  <div class="subtitle">이번 주 영어 단어 시험 놀이!</div>

  <!-- ===================== MENU ===================== -->
  <section id="menu" class="screen active">
    <div class="card">
      <div class="top-bar">
        <h2>어떤 놀이를 할까요?</h2>
      </div>
      <p class="hint" id="menuWordCount"></p>
      <div class="menu-grid">
        <button class="btn purple menu-btn" onclick="startGame('meaning')">
          <span class="emoji">💡</span>
          <span class="label"><b>1. 뜻 보고 단어 쓰기</b><span>뜻을 보고 영어 단어를 써요</span></span>
        </button>
        <button class="btn green menu-btn" onclick="startGame('sentence')">
          <span class="emoji">📖</span>
          <span class="label"><b>2. 예문 빈칸 맞추기</b><span>보기 중에서 알맞은 단어를 골라요</span></span>
        </button>
        <button class="btn blue menu-btn" onclick="startGame('listening')">
          <span class="emoji">🔊</span>
          <span class="label"><b>3. 듣고 뜻 고르기</b><span>단어를 듣고 알맞은 뜻을 골라요</span></span>
        </button>
      </div>
    </div>
    <div class="card" style="text-align:center;">
      <span class="badge" id="unlockBadge">💯 1번과 2번을 모두 100점 맞히면 별 잡기 게임이 열려요!</span>
      <div class="row-actions" id="bonusMenuAction" style="display:none; margin-top:14px;">
        <button class="btn orange full" onclick="showBonusGame()">⭐ 별 잡기 게임 하기</button>
      </div>
    </div>
  </section>

  <!-- ===================== SETUP ===================== -->
  <section id="setup" class="screen">
    <div class="card">
      <div class="top-bar">
        <h2>⚙️ 부모님 설정</h2>
        <button class="btn gray small" onclick="showMenu()">← 뒤로</button>
      </div>
      <p class="hint">이번 주 시험 볼 단어를 입력해 주세요. 저장하면 다음에도 그대로 남아 있어요.</p>

      <div id="wordList"></div>
      <button class="btn orange full small" onclick="addWordRow()">➕ 단어 추가하기</button>

      <div class="row-actions">
        <button class="btn green full" onclick="saveSetup()">💾 저장하고 시작하기</button>
      </div>
      <p class="hint" id="saveMsg" style="text-align:center; color:var(--green); font-weight:700;"></p>
    </div>
  </section>

  <!-- ===================== QUIZ ===================== -->
  <section id="quiz" class="screen">
    <div class="card">
      <div class="top-bar">
        <h2 id="quizTitle"></h2>
        <button class="btn gray small" onclick="quitQuiz()">✕ 그만하기</button>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-text" id="progressText"></div>

      <div id="questionArea"></div>

      <div class="feedback" id="feedback"></div>
      <div id="quizActions"></div>
    </div>
  </section>

  <!-- ===================== RESULT ===================== -->
  <section id="result" class="screen">
    <div class="card">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-msg" id="resultMsg"></div>
      <div id="reviewList"></div>
    </div>
    <div class="card reward-box" id="rewardCard" style="display:none;">
      <div class="emoji">🎉⭐🎉</div>
      <h2 style="color:var(--accent)" id="rewardTitle">별 잡기 게임이 열렸어요!</h2>
      <p class="hint" id="rewardText">1번과 2번을 모두 100점 맞혔어요. 이제 보너스 게임을 할 수 있어요!</p>
      <button class="btn orange full" id="rewardBtn">⭐ 별 잡기 게임 하기</button>
    </div>
    <div class="card">
      <div class="row-actions">
        <button class="btn blue full" id="retryBtn">🔁 다시 도전</button>
        <button class="btn gray full" onclick="showMenu()">🏠 처음으로</button>
      </div>
    </div>
  </section>

  <!-- ===================== BONUS GAME ===================== -->
  <section id="bonus" class="screen">
    <div class="card">
      <div class="top-bar">
        <h2>⭐ 별 잡기 게임</h2>
        <button class="btn gray small" onclick="stopBonusGame(); showMenu();">🏠 처음으로</button>
      </div>
      <p class="hint">반짝이는 별을 빠르게 눌러 점수를 모아요!</p>
      <div class="bonus-hud">
        <div>점수 <span id="bonusScore">0</span></div>
        <div>남은 시간 <span id="bonusTime">20</span>초</div>
      </div>
      <div class="bonus-field" id="bonusField"></div>
      <div class="row-actions">
        <button class="btn orange full" id="bonusStartBtn" onclick="startBonusGame()">▶️ 시작</button>
      </div>
    </div>
  </section>
</div>

<div class="confetti" id="confetti"></div>

<script>
/* =========================================================
   Word Master — 7세 영어 단어 시험 게임
  3가지 단어 게임 + 별 잡기 보너스 게임
   ========================================================= */

const STORAGE_KEY = "wordMasterData_lesson16";

/* 기본 예시 단어 (처음 실행 시) */
const DEFAULT_DATA = {
  // Level 2 · Lesson 16 (부모님이 올린 단어 리스트)
  // 뜻은 리스트의 영어 정의 그대로, 예문은 7세용으로 새로 작성
  words: [
    { word: "chain", meaning: "a line of metal rings that are joined together", sentence: "The dog has a long ___." },
    { word: "gain",  meaning: "to get something good or helpful",               sentence: "I can ___ a star when I do well." },
    { word: "eight", meaning: "the number after seven",                         sentence: "I have ___ crayons." },
    { word: "tail",  meaning: "the long part at the back of an animal's body",  sentence: "The cat has a fluffy ___." },
    { word: "paint", meaning: "colorful liquid used to make pictures",          sentence: "I use red ___ for my picture." },
    { word: "nail",  meaning: "we hit it with a hammer",                        sentence: "Dad hits the ___ with a hammer." },
    { word: "pail",  meaning: "a bucket to carry water or sand",                sentence: "I put sand in my ___." },
    { word: "they",  meaning: "more than one person or animal",                 sentence: "___ are playing together." },
    { word: "snail", meaning: "a small, slow animal with a shell",              sentence: "The ___ moves very slowly." },
    { word: "rain",  meaning: "water falling from the sky",                     sentence: "The ___ is falling from the sky." },
    { word: "wait",  meaning: "to stay in one place until something happens",   sentence: "Please ___ for your turn." },
    { word: "mail",  meaning: "letters or boxes in the post box",               sentence: "I got a card in the ___." },
    { word: "train", meaning: "a long vehicle that runs on tracks.",             sentence: "The ___ runs on tracks." },
    { word: "sail",  meaning: "to move on water in a boat with wind",           sentence: "We can ___ on the blue sea." },
  ],
  perfectScores: { meaning: false, sentence: false }
};

let data = loadData();
let quiz = null; // 진행 중인 퀴즈 상태

/* ---------- 저장/불러오기 ---------- */
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.words)) {
        return {
          ...parsed,
          perfectScores: {
            meaning: Boolean(parsed.perfectScores && parsed.perfectScores.meaning),
            sentence: Boolean(parsed.perfectScores && parsed.perfectScores.sentence),
          },
        };
      }
    }
  } catch (e) { /* 무시하고 기본값 */ }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* ---------- 화면 전환 ---------- */
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}
function showMenu() {
  const n = data.words.length;
  document.getElementById("menuWordCount").textContent =
    n > 0 ? `이번 주 단어 ${n}개가 준비되어 있어요!` : "아직 준비된 단어가 없어요.";
  updateUnlockStatus();
  show("menu");
}
function showSetup() {
  renderWordRows();
  document.getElementById("saveMsg").textContent = "";
  show("setup");
}

/* ---------- 설정: 단어 행 ---------- */
function renderWordRows() {
  const list = document.getElementById("wordList");
  list.innerHTML = "";
  if (data.words.length === 0) addWordRow();
  data.words.forEach((w, i) => list.appendChild(buildWordRow(w, i)));
}
function buildWordRow(w, i) {
  const div = document.createElement("div");
  div.className = "word-row";
  div.innerHTML = `
    <span class="row-num">${i + 1}</span>
    <button class="del" title="삭제" onclick="removeWordRow(${i})">✕</button>
    <div class="grid2">
      <div>
        <label>영어 단어</label>
        <input type="text" data-i="${i}" data-f="word" value="${escapeAttr(w.word)}" placeholder="apple" />
      </div>
      <div>
        <label>한글 뜻</label>
        <input type="text" data-i="${i}" data-f="meaning" value="${escapeAttr(w.meaning)}" placeholder="사과" />
      </div>
    </div>
    <label>예문 (빈칸은 ___ 로 표시)</label>
    <textarea data-i="${i}" data-f="sentence" placeholder="I eat an ___ every day.">${escapeText(w.sentence)}</textarea>
  `;
  return div;
}
function addWordRow() {
  syncRowsToData();
  data.words.push({ word: "", meaning: "", sentence: "" });
  renderWordRows();
}
function removeWordRow(i) {
  syncRowsToData();
  data.words.splice(i, 1);
  renderWordRows();
}
function syncRowsToData() {
  document.querySelectorAll("#wordList [data-i]").forEach(el => {
    const i = +el.dataset.i, f = el.dataset.f;
    if (data.words[i]) data.words[i][f] = el.value;
  });
}
function saveSetup() {
  syncRowsToData();
  data.words = data.words
    .map(w => ({ word: w.word.trim(), meaning: w.meaning.trim(), sentence: (w.sentence || "").trim() }))
    .filter(w => w.word && w.meaning);
  persist();
  const msg = document.getElementById("saveMsg");
  if (data.words.length === 0) {
    msg.style.color = "var(--red)";
    msg.textContent = "단어(영어+뜻)를 최소 1개 이상 입력해 주세요.";
    return;
  }
  msg.style.color = "var(--green)";
  msg.textContent = `저장 완료! 단어 ${data.words.length}개 준비됐어요 🎉`;
  setTimeout(showMenu, 700);
}

/* HTML 이스케이프 */
function escapeAttr(s) { return String(s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;"); }
function escapeText(s) { return String(s || "").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

/* ---------- 퀴즈 시작 ---------- */
const GAME_INFO = {
  meaning:   { title: "💡 뜻 보고 단어 쓰기" },
  sentence:  { title: "📖 예문 빈칸 맞추기" },
  listening: { title: "🔊 듣고 뜻 고르기" },
};

function startGame(mode) {
  if (data.words.length === 0) {
    alert("아직 준비된 단어가 없어요!");
    return;
  }
  if (mode === "sentence") {
    const hasSentence = data.words.some(w => (w.sentence || "").includes("___"));
    if (!hasSentence) {
      alert("예문 빈칸 맞추기는 예문에 빈칸(___)이 필요해요.");
      return;
    }
  }
  quiz = {
    mode,
    order: shuffle([...Array(data.words.length).keys()]),
    idx: 0,
    correct: 0,
    answered: false,
    review: [],
  };
  document.getElementById("quizTitle").textContent = GAME_INFO[mode].title;
  show("quiz");
  renderQuestion();
}

/* ---------- 문제 렌더링 ---------- */
function currentWord() { return data.words[quiz.order[quiz.idx]]; }

function renderQuestion() {
  quiz.answered = false;
  pendingSpeechText = "";
  const total = quiz.order.length;
  document.getElementById("progressBar").style.width = ((quiz.idx) / total * 100) + "%";
  document.getElementById("progressText").textContent = `${quiz.idx + 1} / ${total} 문제`;
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "feedback";

  const area = document.getElementById("questionArea");
  const actions = document.getElementById("quizActions");
  const w = currentWord();

  if (quiz.mode === "meaning") {
    area.innerHTML = `
      <div class="question-box">
        <div class="sub">이 뜻을 가진 영어 단어는?</div>
        <div class="meaning">${escapeText(w.meaning)}</div>
      </div>
      <input type="text" id="typed" class="answer-input" autocomplete="off" autocapitalize="off"
             spellcheck="false" placeholder="영어로 써요" />
    `;
    actions.innerHTML = `<button class="btn green full" onclick="checkTyped()">✅ 정답 확인</button>`;
    setupEnter();

  } else if (quiz.mode === "sentence") {
    // 빈칸 있는 단어만 대상으로. 현재 단어에 빈칸 없으면 다음으로 스킵.
    if (!(w.sentence || "").includes("___")) { quiz.idx++; if (quiz.idx >= total) return finishQuiz(); return renderQuestion(); }
    const display = escapeText(w.sentence).replace("___", '<span class="blank">?</span>');
    const opts = buildOptions(w.word);
    area.innerHTML = `
      <div class="question-box">
        <div class="sub">빈칸에 알맞은 단어를 골라요</div>
        <div class="blank-sentence">${display}</div>
      </div>
      <div class="options" id="optArea">
        ${opts.map(o => `<button class="option-btn" onclick="chooseOption(this, '${escapeAttr(o)}')">${escapeText(o)}</button>`).join("")}
      </div>
    `;
    actions.innerHTML = "";

  } else if (quiz.mode === "listening") {
    const opts = buildMeaningOptions(w.meaning);
    area.innerHTML = `
      <div class="question-box">
        <div class="sub">소리를 듣고 뜻을 골라요</div>
        <button class="speak-btn" data-word="${escapeAttr(w.word)}" onclick="speak(this.dataset.word)" aria-label="단어 다시 듣기">🔊</button>
        <div class="sub">버튼을 누르면 다시 들을 수 있어요</div>
      </div>
      <div class="options" id="optArea">
        ${opts.map(o => `<button class="option-btn" data-meaning="${escapeAttr(o)}" onclick="chooseMeaningOption(this)">${escapeText(o)}</button>`).join("")}
      </div>
    `;
    actions.innerHTML = "";
    setTimeout(() => speak(w.word), 250);
  }
}

/* 보기 3~4개 구성 (정답 + 오답) */
function buildOptions(answer) {
  const others = data.words.map(w => w.word).filter(x => x && x.toLowerCase() !== answer.toLowerCase());
  const distractors = shuffle(others).slice(0, Math.min(3, others.length));
  return shuffle([answer, ...distractors]);
}
function buildMeaningOptions(answer) {
  const others = data.words.map(w => w.meaning).filter(x => x && x !== answer);
  const distractors = shuffle(others).slice(0, Math.min(3, others.length));
  return shuffle([answer, ...distractors]);
}

/* ---------- 정답 처리 ---------- */
function checkTyped() {
  if (quiz.answered) return;
  const input = document.getElementById("typed");
  const guess = (input.value || "").trim().toLowerCase();
  if (!guess) { input.focus(); return; }
  const w = currentWord();
  const ok = guess === w.word.trim().toLowerCase();
  input.readOnly = true;
  markAnswer(ok, w, input.value.trim());
  nextButton();
}

function chooseOption(btn, chosen) {
  if (quiz.answered) return;
  const w = currentWord();
  const ok = chosen.toLowerCase() === w.word.toLowerCase();
  document.querySelectorAll("#optArea .option-btn").forEach(b => {
    b.disabled = true;
    if (b.textContent.toLowerCase() === w.word.toLowerCase()) b.classList.add("correct");
  });
  if (!ok) btn.classList.add("wrong");
  markAnswer(ok, w, chosen);
  nextButton();
}

function chooseMeaningOption(btn) {
  if (quiz.answered) return;
  const w = currentWord();
  const chosen = btn.dataset.meaning || "";
  const ok = chosen === w.meaning;
  document.querySelectorAll("#optArea .option-btn").forEach(b => {
    b.disabled = true;
    if (b.dataset.meaning === w.meaning) b.classList.add("correct");
  });
  if (!ok) btn.classList.add("wrong");
  markAnswer(ok, w, chosen);
  nextButton();
}

function markAnswer(ok, w, given) {
  quiz.answered = true;
  const fb = document.getElementById("feedback");
  if (ok) {
    quiz.correct++;
    fb.textContent = "정답이에요! 🎉";
    fb.className = "feedback ok";
    playTone(true);
  } else {
    fb.textContent = `아쉬워요! 정답은 "${w.word}" ✍️`;
    fb.className = "feedback no";
    playTone(false);
    speak(w.word);
  }
  quiz.review.push({ word: w.word, meaning: w.meaning, given, ok });
}

function nextButton() {
  const last = quiz.idx >= quiz.order.length - 1;
  document.getElementById("quizActions").innerHTML =
    `<button class="btn blue full" onclick="nextQuestion()">${last ? "📊 결과 보기" : "다음 문제 ▶️"}</button>`;
}

function nextQuestion() {
  quiz.idx++;
  if (quiz.idx >= quiz.order.length) return finishQuiz();
  renderQuestion();
}

function quitQuiz() {
  if (confirm("게임을 그만할까요?")) showMenu();
}

function isCoreGameMode(mode) {
  return mode === "meaning" || mode === "sentence";
}

function isBonusUnlocked() {
  return Boolean(data.perfectScores && data.perfectScores.meaning && data.perfectScores.sentence);
}

function updateUnlockStatus() {
  const perfectScores = data.perfectScores || { meaning: false, sentence: false };
  const count = Number(Boolean(perfectScores.meaning)) + Number(Boolean(perfectScores.sentence));
  const unlocked = count === 2;
  document.getElementById("unlockBadge").textContent = unlocked
    ? "⭐ 별 잡기 게임이 열렸어요!"
    : `💯 1번과 2번을 모두 100점 맞히면 별 잡기 게임이 열려요! (${count}/2 완료)`;
  document.getElementById("bonusMenuAction").style.display = unlocked ? "flex" : "none";
}

/* ---------- 결과 ---------- */
function finishQuiz() {
  const total = quiz.review.length;
  const score = total ? Math.round(quiz.correct / total * 100) : 0;
  const mode = quiz.mode;
  if (score === 100 && isCoreGameMode(mode)) {
    data.perfectScores = { ...(data.perfectScores || {}), [mode]: true };
    persist();
  }
  document.getElementById("progressBar").style.width = "100%";

  document.getElementById("resultScore").textContent = score + "점";
  const emoji = document.getElementById("resultEmoji");
  const msg = document.getElementById("resultMsg");

  if (score === 100) {
    emoji.textContent = "🏆";
    msg.textContent = "완벽해요! 모든 단어를 맞혔어요!";
  } else if (score >= 60) {
    emoji.textContent = "😄";
    msg.textContent = "잘했어요! 조금만 더 연습해요.";
  } else {
    emoji.textContent = "💪";
    msg.textContent = "괜찮아요! 다시 도전하면 더 잘할 수 있어요.";
  }

  // 오답 리뷰
  const rv = document.getElementById("reviewList");
  rv.innerHTML = "<h2 style='font-size:1.1rem;margin:16px 0 10px;'>📋 다시 보기</h2>" +
    quiz.review.map(r => `
      <div class="review-item ${r.ok ? "ok" : "no"}">
        <span class="w">${r.ok ? "⭕" : "❌"} ${escapeText(r.word)} <span class="ans">(${escapeText(r.meaning)})</span></span>
        ${r.ok ? "" : `<span class="ans">내 답: ${escapeText(r.given) || "(빈칸)"}</span>`}
      </div>`).join("");

  // 보상
  const rewardCard = document.getElementById("rewardCard");
  const rewardBtn = document.getElementById("rewardBtn");
  if (isBonusUnlocked()) {
    rewardCard.style.display = "block";
    rewardBtn.onclick = showBonusGame;
  } else {
    rewardCard.style.display = "none";
  }

  document.getElementById("retryBtn").onclick = () => startGame(mode);

  show("result");
  if (score === 100) launchConfetti();
}

/* ---------- 보너스 게임 ---------- */
let bonusScore = 0;
let bonusTime = 20;
let bonusTimer = null;
let bonusSpawner = null;

function showBonusGame() {
  if (!isBonusUnlocked()) {
    alert("1번과 2번을 모두 100점 맞히면 열려요!");
    return;
  }
  resetBonusGame();
  show("bonus");
}

function resetBonusGame() {
  stopBonusGame();
  bonusScore = 0;
  bonusTime = 20;
  document.getElementById("bonusScore").textContent = bonusScore;
  document.getElementById("bonusTime").textContent = bonusTime;
  document.getElementById("bonusField").innerHTML = "";
  const btn = document.getElementById("bonusStartBtn");
  btn.disabled = false;
  btn.textContent = "▶️ 시작";
}

function startBonusGame() {
  stopBonusGame();
  bonusScore = 0;
  bonusTime = 20;
  document.getElementById("bonusScore").textContent = bonusScore;
  document.getElementById("bonusTime").textContent = bonusTime;
  document.getElementById("bonusField").innerHTML = "";
  const btn = document.getElementById("bonusStartBtn");
  btn.disabled = true;
  btn.textContent = "별을 잡아요!";
  spawnBonusStar();
  bonusSpawner = setInterval(spawnBonusStar, 650);
  bonusTimer = setInterval(() => {
    bonusTime--;
    document.getElementById("bonusTime").textContent = bonusTime;
    if (bonusTime <= 0) endBonusGame();
  }, 1000);
}

function spawnBonusStar() {
  const field = document.getElementById("bonusField");
  if (!field) return;
  const star = document.createElement("button");
  star.className = "bonus-star";
  star.type = "button";
  star.textContent = ["⭐", "🌟", "✨"][Math.floor(Math.random() * 3)];
  star.style.left = (10 + Math.random() * 80) + "%";
  star.style.top = (12 + Math.random() * 76) + "%";
  star.onclick = () => {
    bonusScore++;
    document.getElementById("bonusScore").textContent = bonusScore;
    star.remove();
    playTone(true);
  };
  field.appendChild(star);
  setTimeout(() => star.remove(), 1100);
}

function stopBonusGame() {
  clearInterval(bonusTimer);
  clearInterval(bonusSpawner);
  bonusTimer = null;
  bonusSpawner = null;
}

function endBonusGame() {
  stopBonusGame();
  document.getElementById("bonusField").innerHTML = `
    <div class="question-box" style="margin:24px;">
      <div class="result-emoji">${bonusScore >= 18 ? "🏆" : "⭐"}</div>
      <h2>${bonusScore}개 잡았어요!</h2>
      <p class="hint">${bonusScore >= 18 ? "반짝반짝 최고 기록이에요!" : "다시 하면 더 많이 잡을 수 있어요!"}</p>
    </div>
  `;
  const btn = document.getElementById("bonusStartBtn");
  btn.disabled = false;
  btn.textContent = "🔁 다시 시작";
  if (bonusScore >= 18) launchConfetti();
}

/* ---------- 발음 (Web Speech API) ---------- */
let preferredVoice = null;
let pendingSpeechText = "";
let hasLoadedVoices = false;

function pickVoice() {
  if (!window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) return null;
  hasLoadedVoices = true;
  const preferredNames = ["Samantha", "Ava", "Jenny", "Aria", "Google US English", "Microsoft Jenny"];
  preferredVoice = preferredNames
    .map(name => voices.find(v => v.name.includes(name)))
    .find(Boolean) || voices.find(v => v.lang === "en-US") || voices.find(v => v.lang.startsWith("en")) || null;
  return preferredVoice;
}

function handleVoicesReady() {
  pickVoice();
  if (!hasLoadedVoices || !pendingSpeechText) return;
  const text = pendingSpeechText;
  pendingSpeechText = "";
  speak(text);
}

function speak(text) {
  const speechText = String(text || "").trim();
  if (!speechText || !("speechSynthesis" in window)) return;
  const voice = preferredVoice || pickVoice();
  if (!hasLoadedVoices) {
    pendingSpeechText = speechText;
    return;
  }
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(speechText);
    u.lang = "en-US";
    if (voice) u.voice = voice;
    u.rate = 0.78;
    u.pitch = 1;
    u.volume = 1;
    window.speechSynthesis.speak(u);
  } catch (e) { /* 발음 실패는 게임 진행을 막지 않음 */ }
}

if ("speechSynthesis" in window) {
  if (window.speechSynthesis.addEventListener) {
    window.speechSynthesis.addEventListener("voiceschanged", handleVoicesReady);
  } else {
    window.speechSynthesis.onvoiceschanged = handleVoicesReady;
  }
  pickVoice();
  window.addEventListener("beforeunload", () => window.speechSynthesis.cancel());
}

/* ---------- 효과음 (WebAudio) ---------- */
let audioCtx = null;
function playTone(ok) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const seq = ok ? [523, 659, 784] : [330, 247];
    seq.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.frequency.value = f;
      o.type = "sine";
      o.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime + i * 0.12;
      g.gain.setValueAtTime(0.001, t);
      g.gain.exponentialRampToValueAtTime(0.25, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.start(t); o.stop(t + 0.16);
    });
  } catch (e) { /* 무시 */ }
}

/* ---------- 꽃가루 ---------- */
function launchConfetti() {
  const box = document.getElementById("confetti");
  const colors = ["#ff6ac1", "#6a5cff", "#ff9f1c", "#2ec26b", "#3ea1ff", "#ffd43b"];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement("i");
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = (2 + Math.random() * 2) + "s";
    c.style.animationDelay = (Math.random() * 0.6) + "s";
    if (i % 2) c.style.borderRadius = "50%";
    box.appendChild(c);
  }
  setTimeout(() => { box.innerHTML = ""; }, 4500);
}

/* ---------- 유틸 ---------- */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function setupEnter() {
  const input = document.getElementById("typed");
  if (!input) return;
  input.focus();
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      if (quiz.answered) nextQuestion(); else checkTyped();
    }
  });
}

/* ---------- 시작 ---------- */
showMenu();
</script>
